apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: shopwave
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
      - name: auth
        image: 485626261953.dkr.ecr.ap-south-1.amazonaws.com/shopwave:auth
        ports:
        - containerPort: 3002