apiVersion: apps/v1
kind: Deployment
metadata:
  name: product
  namespace: shopwave
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product
  template:
    metadata:
      labels:
        app: product
    spec:
      containers:
      - name: product
        image: 485626261953.dkr.ecr.ap-south-1.amazonaws.com/shopwave:product
        ports:
        - containerPort: 3006