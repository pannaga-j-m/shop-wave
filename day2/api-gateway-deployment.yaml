apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: shopwave
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: 485626261953.dkr.ecr.ap-south-1.amazonaws.com/shopwave:api-gateway
        ports:
        - containerPort: 3001