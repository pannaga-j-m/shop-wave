apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: shopwave
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: 485626261953.dkr.ecr.ap-south-1.amazonaws.com/shopwave:frontend
        ports:
        - containerPort: 3000