apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  namespace: shopwave
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment
  template:
    metadata:
      labels:
        app: payment
    spec:
      containers:
      - name: payment
        image: 485626261953.dkr.ecr.ap-south-1.amazonaws.com/shopwave:payment
        ports:
        - containerPort: 3004