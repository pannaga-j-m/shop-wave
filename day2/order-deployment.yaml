apiVersion: apps/v1
kind: Deployment
metadata:
  name: order
  namespace: shopwave
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order
  template:
    metadata:
      labels:
        app: order
    spec:
      containers:
      - name: order
        image: 485626261953.dkr.ecr.ap-south-1.amazonaws.com/shopwave:order
        ports:
        - containerPort: 3005