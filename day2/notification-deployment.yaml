apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
  namespace: shopwave
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification
  template:
    metadata:
      labels:
        app: notification
    spec:
      containers:
      - name: notification
        image: y485626261953.dkr.ecr.ap-south-1.amazonaws.com/shopwave:notification
        ports:
        - containerPort: 3003